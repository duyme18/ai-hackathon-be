services:
  db:
    image: mariadb:11.4
    container_name: ai_hackathon_db
    environment:
      MARIADB_ROOT_PASSWORD: root1234
      MARIADB_DATABASE: ai_hackathon
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
